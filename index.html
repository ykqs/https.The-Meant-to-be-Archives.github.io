<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Meant-to-be Archives | 克苏鲁同人档案馆</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #050709;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
            cursor: default;
        }

        /* 容器样式 */
        .archive-container {
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.9), #071212);
            border: 2px solid;
            border-image: linear-gradient(45deg, #00ff9d, #006666, #00ff9d) 1;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.2), inset 0 0 50px rgba(0, 102, 102, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* 页面基础样式 + 切换动画 */
        .page {
            padding: 3rem 2.5rem 3.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            z-index: 1;
            animation: pageFadeIn 0.5s ease-out;
        }

        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden-page {
            display: none;
        }

        /* 首页巨型眼睛 - 优化视觉效果 */
        .eye-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .giant-eye-svg {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            filter: drop-shadow(0 0 40px rgba(0, 255, 157, 0.3)); /* 降低阴影强度 */
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .eye-iris {
            transform-origin: center;
            transition: transform 0.08s linear;
        }

        /* 触须装饰 */
        .tentacle {
            position: fixed;
            background: linear-gradient(90deg, #003333, #006666);
            border-radius: 50px;
            opacity: 0.5;
            animation: tentacleWave 12s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .tentacle-1 { width: 25px; height: 400px; top: 5%; left: 2%; transform: rotate(-35deg); animation-delay: 0s; }
        .tentacle-2 { width: 20px; height: 350px; top: 15%; right: 3%; transform: rotate(40deg); animation-delay: 2s; }
        .tentacle-3 { width: 30px; height: 450px; bottom: 5%; left: 5%; transform: rotate(20deg); animation-delay: 4s; }
        .tentacle-4 { width: 22px; height: 380px; bottom: 10%; right: 4%; transform: rotate(-25deg); animation-delay: 6s; }

        @keyframes tentacleWave {
            0%, 100% { transform: rotate(-35deg); opacity: 0.4; }
            50% { transform: rotate(35deg); opacity: 0.7; }
        }

        /* 装饰元素 */
        .eye-tape-deco {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            font-size: 2.5rem;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px #00ff9d);
            position: relative;
            z-index: 2;
        }

        .eye-tape-deco i {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid #00ff9d;
            animation: decoFloat 4s infinite ease-in-out;
        }

        @keyframes decoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 标题样式 - 核心优化：降低散光/增强清晰度 */
        .glitch-title {
            font-family: 'Cormorant Garamond', 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: clamp(2rem, 5vw, 3.8rem);
            letter-spacing: -1px;
            /* 简化渐变，降低发光强度，增强文字实体感 */
            background: linear-gradient(135deg, #00e68c, #00cccc, #00e68c);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: #00e68c; /* 增加基础色，避免完全透明导致看不清 */
            /* 大幅降低阴影强度，只保留轻微轮廓 */
            text-shadow: 0 0 6px rgba(0, 255, 157, 0.5), 1px 1px 0 #000, -1px -1px 0 #000;
            margin-bottom: 2rem;
            position: relative;
            animation: titleGlow 8s infinite ease-in-out;
            padding: 1rem 2rem;
            background-color: rgba(0, 10, 10, 0.85); /* 加深背景，增强对比 */
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 157, 0.5);
            display: inline-block;
            z-index: 2;
        }

        /* 二级标题（二选一页面）- 优化清晰度 */
        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.3rem, 2.8vw, 2rem);
            font-weight: 600;
            font-style: italic;
            margin-bottom: 1.8rem;
            /* 简化渐变，增加基础色 */
            background: linear-gradient(135deg, #ffcc33, #ff8833, #ffcc33);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: #ffcc33; /* 增加基础色 */
            /* 降低阴影强度 */
            text-shadow: 0 0 4px rgba(255, 217, 102, 0.3), 0.5px 0.5px 0 #000;
            animation: titleGlow 6s infinite ease-in-out reverse;
            z-index: 2;
        }

        /* 文本容器 - 所有文本首行缩进2字符 */
        .story-text {
            margin: 2rem auto;
            background: rgba(0, 10, 10, 0.7);
            border-radius: 2rem;
            padding: 2rem 2.5rem;
            border: 1px solid;
            border-image: linear-gradient(45deg, #006666, #00ff9d, #006666) 1;
            max-width: 80ch;
            font-size: clamp(1rem, 2vw, 1.15rem);
            line-height: 1.8;
            color: #e6f8f8;
            text-align: left;
            box-shadow: inset 0 0 30px rgba(0, 102, 102, 0.2), 0 10px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        /* 所有段落首行缩进2字符，包括英文 */
        .story-text p {
            text-indent: 2em;
            margin-bottom: 1.2em;
            font-family: 'Inter', sans-serif;
        }
        .story-text p:last-child {
            margin-bottom: 0;
        }

        /* 反馈文本也首行缩进 */
        .extra-feedback {
            background: rgba(0, 20, 20, 0.8);
            border-radius: 1.8rem;
            padding: 1.5rem 2rem;
            margin: 1.5rem auto;
            border: 1px solid #ffd966;
            color: #f8f8e6;
            font-style: italic;
            font-size: clamp(0.95rem, 1.8vw, 1.1rem);
            line-height: 1.7;
            max-width: 75ch;
            text-align: left;
            box-shadow: inset 0 0 20px rgba(255, 217, 102, 0.1), 0 5px 15px rgba(0, 0, 0, 0.4);
            font-family: 'Cormorant Garamond', serif;
        }
        .extra-feedback p {
            text-indent: 2em;
            margin-bottom: 0.8em;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 2.5rem auto 1.5rem;
            justify-content: center;
            max-width: 80%;
            z-index: 2;
        }

        .choice-btn, .cont-btn {
            background: linear-gradient(145deg, #0f2f2f, #071a1a);
            border: 2px solid;
            border-image: linear-gradient(45deg, #00ff9d, #006666) 1;
            padding: 1rem 2rem;
            font-weight: 600;
            font-size: clamp(0.95rem, 1.8vw, 1.1rem);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #b3fff0;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(0, 255, 157, 0.1);
            position: relative;
            overflow: hidden;
        }

        .choice-btn::before, .cont-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.1), transparent);
            transition: all 0.6s ease;
        }

        .choice-btn:hover, .cont-btn:hover {
            background: linear-gradient(145deg, #1a4a4a, #0f2f2f);
            transform: translateY(-3px) scale(0.98);
            border-image: linear-gradient(45deg, #00ffff, #00ff9d) 1;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 255, 157, 0.2);
        }

        .choice-btn:hover::before, .cont-btn:hover::before {
            left: 100%;
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(50%);
        }

        .cont-btn {
            background: linear-gradient(145deg, #1a3a3a, #0f2f2f);
            border-image: linear-gradient(45deg, #009999, #00ff9d) 1;
        }

        .hidden {
            display: none;
        }
  /* 主题样式 */
        .theme-green-black { background: radial-gradient(ellipse at 30% 40%, #102020, #030707); }
        .theme-purple { background: radial-gradient(ellipse at 70% 20%, #1e172f, #0b0817); }
        .theme-yellow { background: radial-gradient(ellipse at 40% 80%, #2f2a1a, #0f0e07); }

        .tape-line {
            height: 6px;
            background: repeating-linear-gradient(90deg, #00ff9d, #00ff9d 15px, #003333 15px, #003333 30px);
            width: 80%;
            margin: 30px auto 15px;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
            z-index: 2;
            position: relative;
        }

        @keyframes titleGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @media (max-width: 700px) {
            .page { padding: 2rem 1.5rem; }
            .glitch-title { font-size: clamp(1.8rem, 4vw, 2.5rem); padding: 0.8rem 1.5rem; }
            h2 { font-size: clamp(1.1rem, 2.5vw, 1.6rem); }
            .story-text { padding: 1.5rem 1.8rem; max-width: 100%; font-size: clamp(0.95rem, 2vw, 1.05rem); }
            .button-group { max-width: 100%; gap: 1rem; }
            .choice-btn, .cont-btn { padding: 0.8rem 1.5rem; }
            .eye-tape-deco { font-size: 2rem; gap: 15px; }
        }

        i.fa, i.far, i.fas { margin-right: 8px; }
        
        /* 首页前景内容高z-index */
        .home-foreground {
            position: relative;
            z-index: 10;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="archive-container" id="appRoot"></div>

<script>
    (function() {
        // ---------- 模拟音频 ----------
        const audio1 = { play: () => Promise.resolve() };
        const audio2 = { play: () => Promise.resolve() };
        
        // ---------- 全局状态 ----------
        let currentPageId = 'page0';
        const countPages = ['page3', 'page4', 'page5', 'page6', 'page9'];
        let choiceRecord = { page3: null, page4: null, page5: null, page6: null, page9: null };
        let pageLocked = { page3: false, page4: false, page5: false, page6: false, page7: false, page8: false, page9: false, page10: false };
        
        // 挂载showPage到window，让按钮可以全局调用
        window.showPage = showPage;
        
        // 辅助：将story-text中的<br>转为带缩进的<p>
        function formatStoryTexts(container) {
            const storyDivs = container.querySelectorAll('.story-text');
            storyDivs.forEach(div => {
                if (div.querySelector('p')) return;
                let html = div.innerHTML;
                if (html.includes('<br')) {
                    const parts = html.split(/<br\s*\/?>/i);
                    const paragraphs = parts.map(p => p.trim()).filter(p => p !== '');
                    if (paragraphs.length) {
                        div.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
                    }
                }
            });
            // 同样处理 extra-feedback 内的文本
            const extraDivs = container.querySelectorAll('.extra-feedback');
            extraDivs.forEach(div => {
                if (div.querySelector('p')) return;
                let html = div.innerHTML;
                if (html.includes('<br')) {
                    const parts = html.split(/<br\s*\/?>/i);
                    const paragraphs = parts.map(p => p.trim()).filter(p => p !== '');
                    if (paragraphs.length) {
                        div.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
                    }
                } else if (!html.includes('<p>') && html.trim().length > 0) {
                    // 纯文本包裹成段落以实现缩进
                    div.innerHTML = `<p>${html}</p>`;
                }
            });
        }
        
        // 显示页面并添加动画类
        function showPage(pageId) {
            const allPages = document.querySelectorAll('.page');
            allPages.forEach(page => {
                page.classList.add('hidden-page');
                page.style.animation = 'none';
            });
            const target = document.getElementById(pageId);
            if (target) {
                target.classList.remove('hidden-page');
                // 触发重绘后添加动画
                target.offsetHeight;
                target.style.animation = 'pageFadeIn 0.5s ease-out';
            } else {
                console.warn('页面不存在:', pageId);
                return;
            }
            currentPageId = pageId;
            if (pageId === 'page10') updateFinalPage();
            if (pageId === 'page1') {
                audio1.play().catch(e => console.log("音频播放跳过"));
            }
        }
        
        // 分支选择处理（跳转到独立反馈页）
        function setupChoice(btnsId, choice1Page, choice2Page, pageKey, isCounting = true) {
            const btnsDiv = document.getElementById(btnsId);
            if (!btnsDiv) return;
            const btns = btnsDiv.querySelectorAll('.choice-btn');
            const clickHandler = (e) => {
                if (pageLocked[pageKey]) return;
                const choiceVal = parseInt(e.currentTarget.getAttribute('data-choice'));
                if (isCounting && countPages.includes(pageKey)) {
                    choiceRecord[pageKey] = (choiceVal === 2);
                }
                pageLocked[pageKey] = true;
                btns.forEach(btn => btn.disabled = true);
                const targetPage = choiceVal === 1 ? choice1Page : choice2Page;
                showPage(targetPage);
            };
            btns.forEach(btn => {
                btn.removeEventListener('click', clickHandler);
                btn.addEventListener('click', clickHandler);
            });
        }
        
        function updateFinalPage() {
            const count2 = Object.values(choiceRecord).filter(val => val === true).length;
            const total = count2 + 1;
            const titleElem = document.getElementById('finalTitle');
            if (titleElem) {
                titleElem.innerHTML = `雄伟的同人女拯救了${total}次家产（如果他们还是你家产的话......不是了就让他们自生自灭吧！）`;
            }
        }

        // 鼠标跟随眼睛移动逻辑
        function setupEyeFollow() {
            const eyeContainer = document.getElementById('eyeContainer');
            const irisElements = document.querySelectorAll('.eye-iris');
            if (!eyeContainer || !irisElements.length) return;

            const eyeRect = eyeContainer.getBoundingClientRect();
            const eyeCenterX = eyeRect.width / 2;
            const eyeCenterY = eyeRect.height / 2;
            const maxMove = 60; // 降低虹膜最大移动距离，更自然
            const minOpacity = 0.7; // 增加虹膜基础不透明度

            // 初始化虹膜样式
            irisElements.forEach(iris => {
                iris.style.opacity = minOpacity;
            });

            document.addEventListener('mousemove', (e) => {
                // 计算鼠标相对眼睛中心的位置
                const mouseX = e.clientX - (eyeRect.left + eyeCenterX);
                const mouseY = e.clientY - (eyeRect.top + eyeCenterY);
                
                // 计算移动比例（限制最大移动距离，更柔和）
                const moveX = (mouseX / eyeCenterX) * maxMove * 0.8;
                const moveY = (mouseY / eyeCenterY) * maxMove * 0.8;

                // 应用到所有虹膜元素（更平滑）
                irisElements.forEach(iris => {
                    iris.style.transform = `translate(${moveX}px, ${moveY}px)`;
                    // 鼠标越远，虹膜越暗，增加层次感
                    const distance = Math.sqrt(mouseX*mouseX + mouseY*mouseY);
                    const opacity = Math.max(minOpacity, 1 - (distance / (eyeCenterX * 1.5)));
                    iris.style.opacity = opacity;
                });
            });
        }
        
        // 构建完整HTML（优化眼睛SVG视觉效果）
        function buildHTML() {
            return `
            <!-- 首页 - 全屏眼睛 + 触须 -->
            <div id="page0" class="page theme-green-black" style="position: relative; overflow: hidden;">
                <!-- 全屏眼睛容器 -->
                <div class="eye-fullscreen" id="eyeContainer">
                    <svg class="giant-eye-svg" id="giantEyeSvg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet" style="width: 100%; height: 100%;">
                        <defs>
                            <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#00ff9d" stop-opacity="0.2"/> <!-- 降低光晕强度 -->
                                <stop offset="100%" stop-color="#002222" stop-opacity="0"/>
                            </radialGradient>
                            <!-- 新增虹膜渐变，更有层次感 -->
                            <radialGradient id="irisGradient" cx="40%" cy="40%" r="80%">
                                <stop offset="0%" stop-color="#00cc88"/>
                                <stop offset="80%" stop-color="#004444"/>
                                <stop offset="100%" stop-color="#002222"/>
                            </radialGradient>
                        </defs>
                        <!-- 眼白背景 - 优化颜色和质感 -->
                        <ellipse cx="600" cy="400" rx="520" ry="330" fill="#001a1a" stroke="#005555" stroke-width="3" opacity="0.98"/>
                        <!-- 虹膜基底 - 优化渐变和大小 -->
                        <ellipse cx="600" cy="400" rx="280" ry="240" fill="url(#irisGradient)" stroke="#00e68c" stroke-width="2" opacity="0.95"/>
                        <!-- 瞳孔 - 优化大小和质感 -->
                        <ellipse class="eye-iris" cx="600" cy="400" rx="120" ry="110" fill="#004444" opacity="0.9">
                            <animate attributeName="filter" values="drop-shadow(0 0 15px #00e68c);drop-shadow(0 0 25px #00cccc);drop-shadow(0 0 15px #00e68c)" dur="3s" repeatCount="indefinite"/>
                        </ellipse>
                        <!-- 瞳孔中心深色 - 更小更精致 -->
                        <ellipse class="eye-iris" cx="600" cy="400" rx="60" ry="55" fill="#002222" opacity="0.95"/>
                        <!-- 高光反射 - 优化大小和位置，更自然 -->
                        <ellipse cx="510" cy="310" rx="30" ry="25" fill="#ffffff" opacity="0.8"/>
                        <ellipse cx="550" cy="270" rx="15" ry="12" fill="#ffffff" opacity="0.6"/>
                        <ellipse cx="670" cy="470" rx="18" ry="15" fill="#ffffff" opacity="0.4"/>
                        <!-- 血丝纹理 - 更细更淡，不突兀 -->
                        <path d="M200 300 Q 400 350 550 340" stroke="#008888" stroke-width="1.5" fill="none" opacity="0.3"/>
                        <path d="M180 450 Q 380 420 540 430" stroke="#008888" stroke-width="1.5" fill="none" opacity="0.3"/>
                        <path d="M800 280 Q 700 330 650 340" stroke="#008888" stroke-width="1.5" fill="none" opacity="0.3"/>
                        <path d="M820 480 Q 720 440 660 450" stroke="#008888" stroke-width="1.5" fill="none" opacity="0.3"/>
                        <!-- 光晕效果 - 降低强度 -->
                        <ellipse cx="600" cy="400" rx="520" ry="330" fill="url(#eyeGlow)" opacity="0.5"/>
                    </svg>
                </div>
                <!-- 触须装饰 -->
                <div class="tentacle tentacle-1"></div>
                <div class="tentacle tentacle-2"></div>
                <div class="tentacle tentacle-3"></div>
                <div class="tentacle tentacle-4"></div>
                
                <!-- 前景内容 -->
                <div class="home-foreground">
                    <div class="glitch-title">The<br>Meant-to-be<br>Archives</div>
                    <div class="tape-line"></div>
                    <div class="button-group"><button id="startBtn" class="choice-btn"><i class="fas fa-skull"></i> 我Cow，这啥！</button></div>
                    <div style="margin-top:30px; text-align:center; font-size:0.9rem; color:#00cc99; filter: drop-shadow(0 0 2px #00cc99);">⚡ 凝视深渊时，深渊也在凝视你的家产 ⚡</div>
                </div>
            </div>

            <!-- 页面1 -->
            <div id="page1" class="page theme-green-black hidden-page">
                <div class="eye-tape-deco"><i class="fas fa-eye"></i> <i class="fas fa-microphone-alt"></i> <i class="fas fa-reel"></i></div>
                <div class="story-text">芒, hopefully if you hear this it means I've found a way to record those '家产99' statements you were telling me about. Even a 同人女 with such an 'unusual' fX癖 as 芒 needs a well-organised archive. As you know, I've been going through trying to digitise and record audio versions but I've been having trouble with a few of the more... bizarre statements. There have been sufficient OOC as to make them utterly unintelligible.</div>
                <div class="button-group"><button id="testmentBtn" class="choice-btn"><i class="fas fa-scroll"></i> Testment Begins</button></div>
                <div class="tape-line"></div>
            </div>

            <!-- 页面2（分支页） -->
            <div id="page2" class="page theme-purple hidden-page">
                <h2 class="glitch-title">三句话，让他为我花了八万</h2>
