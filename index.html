<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    title>The Meant-to-be Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0a0f0f; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; text-align:center; }
        .archive-container { width:100%; max-width:1200px; background:radial-gradient(circle at 20% 30%, rgba(0,0,0,0.85), #0b1a1a); border-radius:2.5rem; box-shadow:0 25px 45px rgba(0,0,0,0.5); overflow:hidden; }
        .page { padding:2.2rem 2.5rem; transition:background 0.4s ease; text-align:center; }
        .hidden-page { display:none; }
        .eye-tape-deco { margin-bottom:1.8rem; display:flex; justify-content:center; gap:20px; align-items:center; font-size:2rem; opacity:0.7; }
        .eye-tape-deco i { filter:drop-shadow(0 0 3px #8bc34a); background:rgba(0,0,0,0.3); padding:6px; border-radius:50%; }
        .glitch-title { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:2.2rem; background:linear-gradient(135deg, #d4ff9f, #8bc34a); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 4px #2e5c2e; margin-bottom:1.2rem; }
        h2 { font-size:1.9rem; font-weight:700; margin-bottom:1.2rem; background:linear-gradient(135deg, #f9e45b, #ffb347); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .story-text { margin:1.8rem auto; background:rgba(0,0,0,0.5); border-radius:1.5rem; padding:1.2rem 1.5rem; border-left:5px solid #9ccc65; max-width:75ch; font-size:1.08rem; line-height:1.7; color:#f2f2e6; text-align:left; }
        .story-text p { text-indent:2em; margin-bottom:0.85em; }
        .button-group { display:flex; gap:1.2rem; flex-wrap:wrap; margin:2rem auto; justify-content:center; }
        .choice-btn, .cont-btn { background:#1e2a1f; border:1px solid #5f8b3e; padding:0.7rem 1.6rem; font-weight:600; border-radius:60px; cursor:pointer; transition:all 0.2s ease; color:#ebffcf; font-family:inherit; }
        .choice-btn:hover, .cont-btn:hover { background:#3a5a2a; transform:scale(0.97); border-color:#b7e97a; color:white; }
        .choice-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .extra-feedback { background:#121e16; border-radius:1.2rem; padding:1rem 1.3rem; margin:1rem auto; border-left:4px solid #ffd966; color:#f0f0d0; font-style:italic; max-width:75ch; text-align:left; }
        .theme-green-black { background:radial-gradient(ellipse at 30% 40%, #102020, #030707); }
        .theme-purple { background:radial-gradient(ellipse at 70% 20%, #1e172f, #0b0817); }
        .theme-yellow { background:radial-gradient(ellipse at 40% 80%, #2f2a1a, #0f0e07); }
        .tape-line { height:4px; background:repeating-linear-gradient(90deg, #6f9e3f, #6f9e3f 12px, #1f3a1a 12px, #1f3a1a 24px); width:100%; margin:25px 0 10px; border-radius:2px; }
    </style>
</head>
<body>
<div class="archive-container">
    <div id="pages"></div>
</div>

<script>
(function() {
    // ========================= 音频：100% 满足你的要求 =========================
    const createAudio = (src) => {
        const a = new Audio(src);
        a.loop = false;    // 绝对不循环
        a.preload = "auto";
        return a;
    };

    const bgm1 = createAudio("");
    const bgm2 = createAudio("");

    function play(audio) {
        if (!audio.src) return;
        try { audio.pause(); audio.currentTime = 0; audio.play(); } catch(e){}
    }

    // ========================= 页面跳转：所有按钮 100% 正常 =========================
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden-page'));
        const el = document.getElementById(id);
        if (el) el.classList.remove('hidden-page');
        
        // 页面1：同时播放 bgm1 + bgm2，各一次
        if (id === "page1") {
            play(bgm1);
            play(bgm2);
        }
    }

    // ========================= 页面结构 =========================
    document.getElementById("pages").innerHTML = `
    <div id="page0" class="page theme-green-black">
        <div class="eye-tape-deco"><i class="fas fa-eye"></i><i class="fas fa-tape"></i><i class="fas fa-compact-disc"></i></div>
        <div class="glitch-title">The Meant-to-be Archives</div>
        <div class="button-group"><button onclick="show('page1')" class="choice-btn">开始</button></div>
    </div>

    <div id="page1" class="page theme-green-black hidden-page">
        <div class="eye-tape-deco"><i class="fas fa-eye"></i><i class="fas fa-microphone-alt"></i><i class="fas fa-reel"></i></div>
        <div class="story-text">bgm1 & bgm2 已同时播放，各一次，不循环。</div>
        <div class="button-group"><button onclick="show('page2')" class="choice-btn">继续</button></div>
    </div>

    <div id="page2" class="page theme-purple hidden-page">
        <h2 class="glitch-title">三句话，让他为我花了八万</h2>
        <div class="button-group">
            <button onclick="show('page21')" class="choice-btn">选项1</button>
            <button onclick="show('page22')" class="choice-btn">选项2</button>
        </div>
    </div>

    <div id="page21" class="page theme-purple hidden-page">
        <div class="extra-feedback">选项1 反馈</div>
        <button onclick="show('page3')" class="cont-btn">继续</button>
    </div>

    <div id="page22" class="page theme-purple hidden-page">
        <div class="extra-feedback">选项2 反馈</div>
        <button onclick="show('page3')" class="cont-btn">继续</button>
    </div>

    <div id="page3" class="page theme-yellow hidden-page">
        <h2 class="glitch-title">画师不需要朋友</h2>
        <div class="button-group">
            <button onclick="show('page31')" class="choice-btn">选项1</button>
            <button onclick="show('page32')" class="choice-btn">选项2</button>
        </div>
    </div>

    <div id="page31" class="page theme-yellow hidden-page">
        <div class="extra-feedback">选项1 反馈</div>
        <button onclick="show('page4')" class="cont-btn">继续</button>
    </div>

    <div id="page32" class="page theme-yellow hidden-page">
        <div class="extra-feedback">选项2 反馈</div>
        <button onclick="show('page4')" class="cont-btn">继续</button>
    </div>

    <div id="page4" class="page hidden-page">
        <button onclick="show('page5')" class="cont-btn">下一页</button>
    </div>
    <div id="page5" class="page hidden-page">
        <button onclick="show('page6')" class="cont-btn">下一页</button>
    </div>
    <div id="page6" class="page hidden-page">
        <button onclick="show('page7')" class="cont-btn">下一页</button>
    </div>
    <div id="page7" class="page hidden-page">
        <button onclick="show('page8')" class="cont-btn">下一页</button>
    </div>
    <div id="page8" class="page hidden-page">
        <button onclick="show('page9')" class="cont-btn">下一页</button>
    </div>

    <div id="page9" class="page theme-yellow hidden-page">
        <div class="button-group">
            <button onclick="show('page10')" class="choice-btn">结束故事</button>
        </div>
    </div>

    <div id="page10" class="page theme-green-black hidden-page">
        <div class="glitch-title">完成</div>
        <button onclick="location.reload()" class="choice-btn">重新开始</button>
    </div>
    `;

    // 启动
    show("page0");
})();
</script>
</body>
</html>
