<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Meant-to-be Archives | 同人女档案馆</title>
    <!-- 引入克苏鲁风格字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #050709;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(15, 40, 40, 0.8) 0%, rgba(0, 0, 0, 1) 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23102828' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* 容器样式 - 克苏鲁华丽边框 */
        .archive-container {
            width: 100%;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.9), #071212);
            border: 2px solid;
            border-image: linear-gradient(45deg, #00ff9d, #006666, #00ff9d) 1;
            box-shadow: 
                0 0 30px rgba(0, 255, 157, 0.2),
                inset 0 0 50px rgba(0, 102, 102, 0.1),
                0 0 80px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* 页面基础样式 */
        .page {
            padding: 3rem 2.5rem 3.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s ease;
            position: relative;
            z-index: 1;
        }

        .hidden-page {
            display: none;
        }

        /* 首页巨型眼睛样式 */
        .eye-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }

        .giant-eye {
            width: clamp(200px, 80vw, 800px);
            height: clamp(150px, 60vw, 600px);
            background: radial-gradient(
                circle at center,
                #002222 0%,
                #003333 20%,
                #001111 80%,
                #000000 100%
            );
            border-radius: 50%;
            position: relative;
            box-shadow: 
                inset 0 0 50px rgba(0, 255, 157, 0.3),
                0 0 100px rgba(0, 255, 157, 0.1);
            animation: eyePulse 8s infinite ease-in-out;
        }

        .eye-pupil {
            width: 40%;
            height: 40%;
            background: #00ff9d;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 30px #00ff9d,
                inset 0 0 20px #006666;
            animation: pupilMove 6s infinite ease-in-out;
        }

        .eye-reflection {
            width: 20%;
            height: 20%;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 20%;
            left: 20%;
            opacity: 0.7;
            filter: blur(2px);
        }

        /* 触须装饰 */
        .tentacle {
            position: absolute;
            background: linear-gradient(90deg, #003333, #006666);
            border-radius: 50px;
            opacity: 0.6;
            animation: tentacleWave 12s infinite ease-in-out;
            z-index: -1;
        }

        .tentacle-1 {
            width: 20px;
            height: 300px;
            top: 10%;
            left: 5%;
            transform: rotate(-30deg);
        }

        .tentacle-2 {
            width: 15px;
            height: 250px;
            top: 20%;
            right: 8%;
            transform: rotate(45deg);
            animation-delay: 2s;
        }

        .tentacle-3 {
            width: 25px;
            height: 350px;
            bottom: 10%;
            left: 15%;
            transform: rotate(15deg);
            animation-delay: 4s;
        }

        .tentacle-4 {
            width: 18px;
            height: 280px;
            bottom: 20%;
            right: 12%;
            transform: rotate(-20deg);
            animation-delay: 6s;
        }

        /* 装饰元素 - 克苏鲁风格 */
        .eye-tape-deco {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            font-size: 2.5rem;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px #00ff9d);
        }

        .eye-tape-deco i {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid #00ff9d;
            animation: decoFloat 4s infinite ease-in-out;
        }

        .eye-tape-deco i:nth-child(2) {
            animation-delay: 1s;
        }

        .eye-tape-deco i:nth-child(3) {
            animation-delay: 2s;
        }

        /* 标题样式 - 克苏鲁扭曲字体 */
        .glitch-title {
            font-family: 'Cormorant Garamond', 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00ff9d, #00ffff, #00ff9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 
                0 0 10px rgba(0, 255, 157, 0.5),
                0 0 20px rgba(0, 255, 255, 0.3);
            margin-bottom: 2rem;
            position: relative;
            animation: titleGlow 8s infinite ease-in-out;
        }

        /* 二级标题 */
        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 600;
            font-style: italic;
            margin-bottom: 1.8rem;
            background: linear-gradient(135deg, #ffd966, #ff9966, #ffd966);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 
                0 0 8px rgba(255, 217, 102, 0.4),
                0 0 15px rgba(255, 153, 102, 0.2);
            animation: titleGlow 6s infinite ease-in-out reverse;
        }

        /* 文本容器 - 高可读性优化 */
        .story-text {
            margin: 2rem auto;
            background: rgba(0, 10, 10, 0.7);
            border-radius: 2rem;
            padding: 2rem 2.5rem;
            border: 1px solid;
            border-image: linear-gradient(45deg, #006666, #00ff9d, #006666) 1;
            max-width: 80ch;
            font-size: clamp(1rem, 2vw, 1.15rem);
            line-height: 1.8;
            color: #e6f8f8;
            text-align: left;
            box-shadow: 
                inset 0 0 30px rgba(0, 102, 102, 0.2),
                0 10px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        /* 段落样式 - 增强可读性 */
        .story-text p {
            text-indent: 2em;
            margin-bottom: 1.2em;
            font-family: 'Inter', sans-serif;
        }

        .story-text p:last-child {
            margin-bottom: 0;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 2.5rem auto 1.5rem;
            justify-content: center;
            max-width: 80%;
            z-index: 2;
        }

        /* 按钮样式 - 克苏鲁华丽风 */
        .choice-btn, .cont-btn {
            background: linear-gradient(145deg, #0f2f2f, #071a1a);
            border: 2px solid;
            border-image: linear-gradient(45deg, #00ff9d, #006666) 1;
            padding: 1rem 2rem;
            font-weight: 600;
            font-size: clamp(0.95rem, 1.8vw, 1.1rem);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #b3fff0;
            font-family: 'Inter', sans-serif;
            box-shadow: 
                0 5px 15px rgba(0, 0, 0, 0.4),
                inset 0 2px 0 rgba(0, 255, 157, 0.1);
            position: relative;
            overflow: hidden;
        }

        .choice-btn::before, .cont-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.1), transparent);
            transition: all 0.6s ease;
        }

        .choice-btn:hover, .cont-btn:hover {
            background: linear-gradient(145deg, #1a4a4a, #0f2f2f);
            transform: translateY(-3px) scale(0.98);
            border-image: linear-gradient(45deg, #00ffff, #00ff9d) 1;
            color: white;
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.5),
                0 0 15px rgba(0, 255, 157, 0.2);
        }

        .choice-btn:hover::before, .cont-btn:hover::before {
            left: 100%;
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(50%);
        }

        .cont-btn {
            background: linear-gradient(145deg, #1a3a3a, #0f2f2f);
            border-image: linear-gradient(45deg, #009999, #00ff9d) 1;
        }

        .hidden {
            display: none;
        }

        /* 反馈文本 - 高可读性优化 */
        .extra-feedback {
            background: rgba(0, 20, 20, 0.8);
            border-radius: 1.8rem;
            padding: 1.5rem 2rem;
            margin: 1.5rem auto;
            border: 1px solid #ffd966;
            color: #f8f8e6;
            font-style: italic;
            font-size: clamp(0.95rem, 1.8vw, 1.1rem);
            line-height: 1.7;
            max-width: 75ch;
            text-align: left;
            box-shadow: 
                inset 0 0 20px rgba(255, 217, 102, 0.1),
                0 5px 15px rgba(0, 0, 0, 0.4);
            font-family: 'Cormorant Garamond', serif;
        }

                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23281028' fill-opacity='0.2' fill-rule='evenodd'/%3E%3C/svg%3E");

        /* 磁带分割线 - 克苏鲁风格 */
        .tape-line {
            height: 6px;
            background: repeating-linear-gradient(90deg, #00ff9d, #00ff9d 15px, #003333 15px, #003333 30px);
            width: 80%;
            margin: 30px auto 15px;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
        }

        /* 动画定义 */
        @keyframes eyePulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes pupilMove {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(-60%, -45%); }
            50% { transform: translate(-50%, -55%); }
            75% { transform: translate(-40%, -45%); }
        }

        @keyframes tentacleWave {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(30deg); }
        }

        @keyframes decoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes titleGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 响应式适配 */
        @media (max-width: 700px) {
            .page { padding: 2rem 1.5rem; }
            .glitch-title { font-size: clamp(1.8rem, 4vw, 2.5rem); }
            h2 { font-size: clamp(1.6rem, 3vw, 2.2rem); }
            .story-text { 
                padding: 1.5rem 1.8rem; 
                max-width: 100%; 
                font-size: clamp(0.95rem, 2vw, 1.1rem);
            }
            .button-group { max-width: 100%; gap: 1rem; }
            .choice-btn, .cont-btn { padding: 0.8rem 1.5rem; }
            .eye-tape-deco { font-size: 2rem; gap: 15px; }
            .tape-line { width: 90%; }
        }

        i.fa, i.far, i.fas { margin-right: 8px; }
    </style>
</head>
<body>
<div class="archive-container" id="appRoot">
    <div id="pagesContainer"></div>
</div>

<script>
    (function() {
        // ---------- 模拟音频（不依赖网络，避免加载失败导致异常）----------
        const audio1 = { play: () => Promise.resolve() };   // 静音占位，不影响功能
        const audio2 = { play: () => Promise.resolve() };
        
        // ---------- 全局状态 ----------
        let currentPageIndex = 0;

            });

        // 绑定全局事件

            // 初始按钮

            setupChoice('pg5-btns', 'page41', 'page42', 'page5', {}, true);
            setupChoice('pg6-btns', 'page51', 'page52', 'page6', {}, true);
            setupChoice('pg7-btns', 'page61', 'page62', 'page7', {}, false);
            setupChoice('pg9-btns', 'page81', 'page82', 'page9', {}, true);
            setupChoice('pg10-btns', 'page91', 'page92', 'page10', {}, false);
            
            // 最终页面的两个按钮
            const yesBtn = document.getElementById('finalYesBtn');
            const resetBtn = document.getElementById('finalResetBtn');
            
            if (yesBtn) {
                yesBtn.addEventListener('click', () => {
                    const extra = document.getElementById('finalExtra');
                    if (extra) {
                        extra.innerHTML = "爽哉。我也喜欢你。";
                        extra.classList.remove('hidden');
                    }
                });
            }
            
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    // 重置所有数据
                    Object.keys(choiceRecord).forEach(k => choiceRecord[k] = null);
                    Object.keys(pageLocked).forEach(k => pageLocked[k] = false);
                    
                    // 重置所有分支按钮
                    [3,4,5,6,7,9,10].forEach(i => {
                        const btnsDiv = document.getElementById(`pg${i}-btns`);
                        if (btnsDiv) {
                            btnsDiv.querySelectorAll('.choice-btn').forEach(btn => {
                                btn.disabled = false;
                            });
                        }
                    });
                    
                    // 隐藏最终页的反馈
                    const finalExtra = document.getElementById('finalExtra');
                    if (finalExtra) finalExtra.classList.add('hidden');
                    
                    // 回到初始页
                    showPage(0);
                });
            }
        }
        
        // 初始化
        function init() {
            const container = document.getElementById('pagesContainer');
            if (container) {
                container.innerHTML = getPagesHTML();
                formatStoryTexts();      // 将<br>转为带缩进的段落
                bindEvents();
                showPage(0); // 显示初始页
            }
        }
        
        // 暴露showPage到全局（供反馈页的continue按钮调用）
        window.showPage = showPage;
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    })();
